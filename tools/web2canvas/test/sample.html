<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: 'Segoe UI', sans-serif; }
  .stage { width: 360px; height: 640px; background: #0e1116; padding: 20px;
           position: relative; overflow: hidden; }
  .title { color: #eef0f2; font-size: 28px; font-weight: 700; }
  .sub { color: #8b93a1; font-size: 14px; margin-top: 6px; }
  .card { margin-top: 18px; height: 140px; background: #1b8f5a; border-radius: 16px;
          padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .card .label { color: #d8ffe9; font-size: 13px; font-weight: 600; }
  .card .amount { color: #ffffff; font-size: 32px; font-weight: 700; margin-top: 10px; }
  .btn { margin-top: 22px; height: 52px; background: #3a7bff; border-radius: 26px;
         border: 2px solid #6f9fff; display: flex; align-items: center; justify-content: center; }
  .btn .t { color: #ffffff; font-size: 17px; font-weight: 600; }
  .pill { margin-top: 18px; width: 120px; height: 34px; background: #23262e;
          border-radius: 17px; }
</style></head>
<body>
  <div class="stage">
    <div class="title">Wallet</div>
    <div class="sub">Your balance overview</div>
    <div class="card">
      <div class="label">TOTAL BALANCE</div>
      <div class="amount">$9,531.70</div>
    </div>
    <div class="btn"><div class="t">Send</div></div>
    <div class="pill"></div>
  </div>
</body></html>
